kind = "mobile"
previewPath = "/"
title = "PluralNest"
version = "1.0.0"
id = "artifacts/pluralnest"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18148

[services.development]
run = "pnpm --filter @workspace/pluralnest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pluralnest", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pluralnest", "run", "serve" ]

[services.env]
PORT = "18148"
BASE_PATH = "/"
